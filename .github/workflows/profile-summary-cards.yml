name: GitHub-Profile-Summary-Cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-summary-cards
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          # Varsayilan token public veriler icin yeterli.
          # Kartlar bos gelirse: PAT olustur (read:user scope),
          # repo secret'i olarak SUMMARY_GITHUB_TOKEN ekle ve burayi degistir.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: "main"
          UTC_OFFSET: 0
          EXCLUDE: ""
          AUTO_PUSH: true
